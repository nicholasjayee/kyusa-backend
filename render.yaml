services:
  - type: web
    name: kyusa-backend
    env: python
    buildCommand: ./build.sh
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: kyusa-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: kyusa-backend.onrender.com

databases:
  - name: kyusa-db
    databaseName: kyusa
    plan: free
