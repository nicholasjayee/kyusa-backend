services:
  - type: web
    name: kyusa-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: ALLOWED_HOSTS
        value: kyusa-backend.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://kyusa-backend.onrender.com,https://kyusa.vercel.app,https://kyusa-client-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://kyusa-backend.onrender.com,https://kyusa.vercel.app,https://kyusa-client-app.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: COOKIE_SECURE
        value: "True"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@kyusa.com
